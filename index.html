<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Kinetic Algebra Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --ink: #1e293b; --action: #2563eb; --delete: #ef4444; }
        body { font-family: 'Comic Sans MS', cursive, sans-serif; background: #fdfdfd; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Dashboard Styling */
        .sidebar { width: 260px; background: #f1f5f9; border-right: 3px solid #cbd5e1; padding: 20px; z-index: 10; }
        .nav-btn { width: 100%; text-align: left; padding: 12px; margin-bottom: 10px; background: white; border: 2px solid #cbd5e1; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .nav-btn:hover { transform: translateX(5px); border-color: var(--action); color: var(--action); }
        
        /* The "Whiteboard" Stage */
        .main { flex: 1; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #canvas { width: 90%; height: 60%; background: white; border: 2px solid #e2e8f0; border-radius: 4px; box-shadow: inset 0 0 50px rgba(0,0,0,0.02); }
        
        .controls { margin-top: 30px; display: flex; align-items: center; gap: 20px; }
        button#play { background: var(--action); color: white; border: none; padding: 15px 40px; border-radius: 8px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #1d4ed8; }
        button#play:active { transform: translateY(4px); box-shadow: none; }
        #status { color: #64748b; font-weight: bold; }
    </style>
</head>
<body>

<nav class="sidebar">
    <h2 style="margin-top: 0;">Skill List</h2>
    <div id="menu"></div>
</nav>

<main class="main">
    <div id="status" aria-live="polite">Choose a skill to start...</div>
    <svg id="canvas" viewBox="0 0 800 400">
        </svg>
    <div class="controls">
        <button id="play" onclick="runLogic()">Animate Steps</button>
    </div>
</main>

<script>
const library = {
    "Fraction Buster": {
        setup: () => `
            <g id="term1">
                <text x="200" y="180" font-size="80" text-anchor="middle">x</text>
                <line x1="170" y1="200" x2="230" y2="200" stroke="black" stroke-width="4" id="bar"/>
                <text x="200" y="260" font-size="60" text-anchor="middle" fill="red" id="den">4</text>
            </g>
            <text x="280" y="210" font-size="80" id="plus">+</text>
            <text x="360" y="210" font-size="80" text-anchor="middle" id="term2">3</text>
            <text x="450" y="210" font-size="80">=</text>
            <text x="540" y="210" font-size="80" text-anchor="middle" id="term3">5</text>
            <text id="buster" x="-100" y="100" font-size="60" fill="blue" font-weight="bold">(4)</text>
        `,
        anim: (tl) => {
            tl.set("#buster", {x: 50, y: 50, opacity: 1})
              // Jump to Denominator
              .to("#buster", {x: 180, y: 220, duration: 0.8, ease: "back.inOut(1.7)"})
              .to("#den, #bar, #buster", {scale: 0, opacity: 0, duration: 0.3, stagger: 0.1})
              .to("#term1", {y: 30, duration: 0.5, ease: "bounce.out"})
              
              // Jump to 3
              .set("#buster", {x: 360, y: 50, scale: 1, opacity: 1})
              .to("#buster", {y: 150, duration: 0.6, ease: "power2.in"})
              .to("#term2", {scale: 1.3, fill: "blue", duration: 0.1}) // Impact
              .add(() => { document.getElementById("term2").textContent = "12"; })
              .to("#term2", {scale: 1, duration: 0.3})
              .to("#buster", {opacity: 0, duration: 0.2})

              // Jump to 5
              .set("#buster", {x: 540, y: 50, scale: 1, opacity: 1})
              .to("#buster", {y: 150, duration: 0.6, ease: "power2.in"})
              .to("#term3", {scale: 1.3, fill: "blue", duration: 0.1})
              .add(() => { document.getElementById("term3").textContent = "20"; })
              .to("#term3", {scale: 1, duration: 0.3})
              .to("#buster", {opacity: 0, duration: 0.2});
        }
    },
    "The Sign Flip": {
        setup: () => `
            <text x="200" y="200" font-size="80" id="neg">-2</text>
            <text x="280" y="200" font-size="80" id="x">x</text>
            <text x="380" y="200" font-size="80" id="sign" text-anchor="middle">></text>
            <text x="500" y="200" font-size="80" id="num">10</text>
        `,
        anim: (tl) => {
            tl.to("#neg", {y: -100, opacity: 0, duration: 0.6, ease: "back.in"})
              .to("#sign", {rotation: 180, transformOrigin: "center", fill: "red", duration: 0.7, ease: "elastic.out(1, 0.3)"})
              .add(() => { document.getElementById("sign").textContent = "<"; })
              .to("#num", {textContent: "-5", fill: "blue", scale: 1.2, duration: 0.4})
              .to("#num", {scale: 1, duration: 0.2});
        }
    }
};

let current = null;
const menu = document.getElementById("menu");
const canvas = document.getElementById("canvas");

Object.keys(library).forEach(key => {
    const b = document.createElement("button");
    b.className = "nav-btn";
    b.innerText = key;
    b.onclick = () => {
        current = key;
        canvas.innerHTML = library[key].setup();
        document.getElementById("status").innerText = "Ready: " + key;
    };
    menu.appendChild(b);
});

function runLogic() {
    if (!current) return;
    const tl = gsap.timeline();
    library[current].anim(tl);
}
</script>

</body>
</html>
