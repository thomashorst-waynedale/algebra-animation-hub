<!DOCTYPE html>
<html>
<head>
    <title>Ohio Algebra 1 Animation Hub</title>
    <style>
        body { font-family: sans-serif; display: flex; margin: 0; background: #f4f7f6; }
        .sidebar { width: 250px; background: #2c3e50; color: white; height: 100vh; padding: 20px; overflow-y: auto; }
        .main { flex: 1; padding: 40px; display: flex; flex-direction: column; align-items: center; }
        .video-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 800px; width: 100%; }
        video { width: 100%; border-radius: 8px; }
        .nav-link { display: block; padding: 10px; color: #bdc3c7; text-decoration: none; border-bottom: 1px solid #34495e; }
        .nav-link:hover { color: #2ecc71; }
        h2 { color: #2c3e50; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>Algebra Skills</h3>
        <a href="#" class="nav-link" onclick="loadVideo('videos/fraction_buster.mp4', 'Fraction Busting (A.REI.3)')">1. Fraction Busting</a>
        <a href="#" class="nav-link" onclick="loadVideo('videos/inequality_flip.mp4', 'Inequality Flip (A.REI.3)')">2. Inequality Flip</a>
        </div>
    <div class="main">
        <h2 id="video-title">Select a Skill</h2>
        <div class="video-container">
            <video id="video-player" controls loop>
                <source id="video-source" src="" type="video/mp4">
            </video>
        </div>
    </div>
    <script>
        function loadVideo(path, title) {
            document.getElementById('video-title').innerText = title;
            document.getElementById('video-source').src = path;
            document.getElementById('video-player').load();
            document.getElementById('video-player').play();
        }
    </script>
</body>
</html>
