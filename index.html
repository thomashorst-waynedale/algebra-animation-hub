<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accessible Algebra Hub</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root { --primary: #166534; --accent: #22c55e; --error: #b91c1c; --text: #0f172a; }
        body { font-family: -apple-system, sans-serif; background: #f1f5f9; margin: 0; display: flex; height: 100vh; color: var(--text); }
        .sidebar { width: 320px; background: #1e293b; color: white; padding: 20px; overflow-y: auto; }
        .nav-btn { width: 100%; text-align: left; padding: 14px; margin-bottom: 10px; background: #334155; border: 2px solid transparent; color: white; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .nav-btn:hover, .nav-btn:focus { border-color: var(--accent); background: #475569; outline: none; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .stage { background: white; border: 4px solid #e2e8f0; border-radius: 16px; width: 100%; max-width: 800px; height: 450px; position: relative; }
        svg { width: 100%; height: 100%; }
        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
        .controls { margin-top: 25px; display: flex; gap: 20px; align-items: center; }
        button#play { background: var(--primary); color: white; border: none; padding: 16px 45px; border-radius: 50px; font-weight: 700; cursor: pointer; font-size: 1.2rem; }
        button#play:active { transform: scale(0.98); }
        #live-status { font-weight: 600; color: #64748b; }
    </style>
</head>
<body>

<div class="sidebar" role="navigation" aria-label="Math Topics">
    <h2 style="color: #94a3b8; font-size: 1.2rem;">Ohio Standards Library</h2>
    <div id="menu"></div>
</div>

<main class="main">
    <div id="standard-info" style="color: #64748b; margin-bottom: 10px; font-weight: bold;">Select a topic to begin</div>
    <div class="stage" role="img" id="stage-container">
        <svg id="canvas" viewBox="0 0 800 450"></svg>
    </div>
    
    <div class="controls">
        <button id="play" onclick="runAnimation()">▶ Run Animation</button>
        <div id="live-status" aria-live="polite">Waiting for selection...</div>
    </div>
</main>

<script>
const library = {
    "1. Fraction Buster": {
        std: "A.REI.3", status: "Multiplying all terms by 4 to clear the denominator.",
        setup: () => `<text x="400" y="225" font-size="80" text-anchor="middle" id="eq">x/4 + 3 = 5</text>`,
        anim: (tl) => {
            tl.to("#eq", {textContent: "(4)x/4 + (4)3 = (4)5", fill: "green", duration: 1})
              .to("#eq", {textContent: "x + 12 = 20", fill: "black", delay: 1});
        }
    },
    "2. Inequality Flip": {
        std: "A.REI.3", status: "Dividing by negative 2. The sign flips directions.",
        setup: () => `<text x="400" y="225" font-size="80" text-anchor="middle" id="eq">-2x > 10</text>`,
        anim: (tl) => {
            tl.to("#eq", {textContent: "x  ?  -5", fill: "red", duration: 1})
              .to("#eq", {textContent: "x < -5", fill: "black", duration: 0.5});
        }
    },
    "3. Distributive Law": {
        std: "A.SSE.1", status: "3 is multiplying every term inside the parentheses.",
        setup: () => `<text x="400" y="225" font-size="80" text-anchor="middle" id="eq">3(x + 4)</text>`,
        anim: (tl) => {
            tl.to("#eq", {textContent: "3·x + 3·4", fill: "green", duration: 1})
              .to("#eq", {textContent: "3x + 12", fill: "black", delay: 0.5});
        }
    },
    "4. Combining Like Terms": {
        std: "A.APR.1", status: "Grouping terms with the same variable.",
        setup: () => `<text x="400" y="225" font-size="80" text-anchor="middle" id="eq">3x + 5 + 2x</text>`,
        anim: (tl) => {
            tl.to("#eq", {textContent: "3x + 2x + 5", duration: 1})
              .to("#eq", {textContent: "5x + 5", fill: "green", duration: 1});
        }
    },
    "5. Zero Pairs": {
        std: "A.REI.3", status: "Moving 5 across the equals sign changes its sign.",
        setup: () => `<text x="400" y="225" font-size="80" text-anchor="middle" id="eq">x + 5 = 12</text>`,
        anim: (tl) => {
            tl.to("#eq", {textContent: "x = 12 - 5", duration: 1})
              .to("#eq", {textContent: "x = 7", fill: "green", duration: 0.5});
        }
    },
    "6. Zero Exponents": {
        std: "8.EE.1", status: "Any non-zero number raised to the zero power is 1.",
        setup: () => `<text x="400" y="225" font-size="100" text-anchor="middle" id="eq">x⁰</text>`,
        anim: (tl) => {
            tl.to("#eq", {scale: 1.5, fill: "orange", duration: 0.5})
              .to("#eq", {textContent: "1", scale: 1, fill: "black", duration: 0.5});
        }
    },
    "7. Vertical Line Test": {
        std: "F.IF.1", status: "A vertical line scans the graph to check for a function.",
        setup: () => `<path d="M 200 300 Q 400 100 600 300" stroke="black" fill="none" stroke-width="5"/>
                      <line id="v-line" x1="100" y1="50" x2="100" y2="400" stroke="red" stroke-width="4"/>`,
        anim: (tl) => {
            tl.to("#v-line", {x1: 700, x2: 700, duration: 2, ease: "none"});
        }
    },
    "8. Factoring GCF": {
        std: "A.SSE.2", status: "Pulling the greatest common factor out of the expression.",
        setup: () => `<text x="400" y="225" font-size="80" text-anchor="middle" id="eq">6x + 9</text>`,
        anim: (tl) => {
            tl.to("#eq", {textContent: "3(2x) + 3(3)", duration: 1})
              .to("#eq", {textContent: "3(2x + 3)", fill: "green", duration: 1});
        }
    },
    "9. Slope Rise/Run": {
        std: "F.IF.6", status: "Slope is the change in y over the change in x.",
        setup: () => `<line x1="200" y1="350" x2="600" y2="150" stroke="#ccc" stroke-width="2"/>
                      <circle id="pt" cx="200" cy="350" r="10" fill="blue"/>`,
        anim: (tl) => {
            tl.to("#pt", {cy: 150, duration: 1}) // Rise
              .to("#pt", {cx: 600, duration: 1}); // Run
        }
    },
    "10. Scientific Notation": {
        std: "8.EE.3", status: "Moving the decimal to create a number between 1 and 10.",
        setup: () => `<text x="400" y="225" font-size="80" text-anchor="middle" id="eq">45000</text>`,
        anim: (tl) => {
            tl.to("#eq", {textContent: "4.5 x 10⁴", duration: 1.5, ease: "bounce.out"});
        }
    }
};

let currentKey = null;
const canvas = document.getElementById("canvas");
const status = document.getElementById("live-status");

// Build Menu
Object.keys(library).forEach(key => {
    const btn = document.createElement("button");
    btn.className = "nav-btn";
    btn.innerText = key;
    btn.onclick = () => {
        currentKey = key;
        canvas.innerHTML = library[key].setup();
        document.getElementById("standard-info").innerText = "Standard: " + library[key].std;
        status.innerText = "Ready to animate: " + key;
    };
    document.getElementById("menu").appendChild(btn);
});

function runAnimation() {
    if (!currentKey) return;
    const tl = gsap.timeline();
    status.innerText = library[currentKey].status;
    library[currentKey].anim(tl);
}
</script>
</body>
</html>
